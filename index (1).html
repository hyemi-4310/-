<title>나의 N잡 창업 유형은? | 유노혜미 진단 테스트</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral: #E8735A;
    --coral-light: #F4A49A;
    --coral-dark: #C9573E;
    --coral-bg: #FDECEA;
    --ivory: #FFF8F5;
    --beige: #F5EDE8;
    --beige2: #EEE0D8;
    --text-dark: #3A2E2A;
    --text-mid: #6B5750;
    --text-light: #A08078;
    --white: #FFFFFF;
    --shadow: 0 4px 24px rgba(232,115,90,0.12);
    --shadow-md: 0 8px 32px rgba(232,115,90,0.18);
    --radius: 20px;
    --radius-sm: 12px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--ivory);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== WRAPPER ===== */
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    min-height: 100vh;
    padding: 0;
    animation: fadeSlideIn 0.45s var(--transition) forwards;
  }
  .screen.active { display: flex; flex-direction: column; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-18px); }
  }
  @keyframes popIn {
    0%   { transform: scale(0.85); opacity: 0; }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes progressAnim {
    from { width: 0%; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
  }

  /* ===== HEADER BRAND ===== */
  .brand-tag {
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.08em;
    padding: 14px 20px 0;
    font-weight: 500;
  }

  /* ===== INTRO SCREEN ===== */
  #screen-intro {
    background: linear-gradient(160deg, #FFF1EE 0%, var(--ivory) 60%, #FEF0EB 100%);
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 28px 48px;
  }

  .intro-deco {
    font-size: 72px;
    margin-bottom: 6px;
    animation: float 3s ease-in-out infinite;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(232,115,90,0.2));
  }

  .intro-brand {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.12em;
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 20px;
    background: var(--coral-bg);
    display: inline-block;
    padding: 5px 14px;
    border-radius: 50px;
  }

  .intro-title {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.35;
    color: var(--text-dark);
    margin-bottom: 10px;
    word-break: keep-all;
  }

    color: var(--coral);

  }
  .intro-title .highlight::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 0; right: 0;
    height: 8px;

    z-index: -1;
    border-radius: 4px;

    padding: 6px 14px;
    border-radius: 50px;

    gap: 5px;

  .info-card {

    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(232,115,90,0.38);
    transition: var(--transition);
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
  }

    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);

    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(232,115,90,0.48);

    padding: 0 0 40px;
  }

  /* Progress Header */
  .q-header {
    background: var(--white);
    padding: 18px 24px 0;
    box-shadow: 0 2px 16px rgba(232,115,90,0.07);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .q-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;

  .q-brand { font-size: 11px; color: var(--text-light); font-weight: 600; letter-spacing: 0.06em; }

  .progress-track {

  .progress-fill {

    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);

  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 20px; height: 100%;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    animation: shimmer 1.5s infinite;
  }

  .progress-dots {
    display: flex;

    padding: 10px 2px 16px;
  }
  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--beige2);
    transition: var(--transition);
    position: relative;
  }
  .progress-dot.done {
    background: var(--coral-light);

  }
  .progress-dot.current {
    background: var(--coral);
    transform: scale(1.3);

  }

  /* Question Card */
  .q-body {

  }

  .q-type-badge {

    box-shadow: 0 4px 18px rgba(232,115,90,0.2);

  .choice-icon {
    font-size: 20px;
    flex-shrink: 0;

  }
  .choice-text { flex: 1; }
  .choice-label {
    display: inline-block;
    width: 20px; height: 20px;
    background: var(--beige);
    color: var(--text-light);
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    text-align: center;
    line-height: 20px;

  .choice-btn.selected .choice-label,
  .choice-btn:hover .choice-label {
    background: var(--coral);
    color: var(--white);
  }

  }

  .likert-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;

  }
  .likert-btn.selected {
    background: linear-gradient(135deg, var(--coral) 0%, var(--coral-light) 100%);
    border-color: var(--coral);
    color: var(--white);
    transform: scale(1.14);
    box-shadow: 0 4px 16px rgba(232,115,90,0.35);
  }

  .likert-emoji-row {
    display: flex;
    justify-content: space-between;
    padding: 0 8px;
    font-size: 18px;
  }

  /* Nav buttons */
  .q-nav {
    display: flex;
    gap: 10px;
    padding: 24px 20px 0;
  }
  .btn-prev {
    padding: 14px 20px;

    border: 2px solid var(--beige2);

  .btn-prev:hover {

  .btn-next {

  .btn-next:hover {

  .loading-emoji {

  }
  .result-hero::before {

        title: '📚 중고책 부업 (보조 추천)',
        desc: '커뮤니티를 운영하며 쉽게 병행할 수 있는 부업이에요. 모임 멤버들과 함께 독서를 연결하는 콘셉트로도 활용 가능해요.',
        featured: true,
        link: true
      }
    ]
  }
};

// ============================================================
// STATE
// ============================================================
let currentQ = 0;
let answers = new Array(8).fill(null);
let scores = [0, 0, 0, 0]; // [콘텐츠, 판매, 지식전달, 모임]
const TOTAL = QUESTIONS.length;

// ============================================================
// SCREENS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ============================================================
// INTRO → START
// ============================================================
function startTest() {
  currentQ = 0;
  answers = new Array(8).fill(null);
  scores = [0, 0, 0, 0];
  buildProgressDots();
  renderQuestion();
  showScreen('screen-question');
}

// ============================================================
// PROGRESS DOTS
// ============================================================
function buildProgressDots() {
  const wrap = document.getElementById('progress-dots');
  wrap.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'progress-dot';
    d.id = `dot-${i}`;
    wrap.appendChild(d);
  }
}

function updateProgress() {
  const pct = ((currentQ + 1) / TOTAL) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${TOTAL}`;
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById(`dot-${i}`);
    d.className = 'progress-dot' + (i < currentQ ? ' done' : i === currentQ ? ' current' : '');
  }
  document.getElementById('btn-prev').style.display = currentQ === 0 ? 'none' : '';
}

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQuestion() {
  updateProgress();
  const q = QUESTIONS[currentQ];
  const body = document.getElementById('q-body');
  body.style.opacity = '0';
  body.style.transform = 'translateX(20px)';

  setTimeout(() => {
    if (q.type === 'choice') {
      body.innerHTML = buildChoiceHTML(q);
    } else {
      body.innerHTML = buildLikertHTML(q);
    }
    restoreAnswer();
    body.style.transition = 'all 0.35s cubic-bezier(0.4,0,0.2,1)';
    body.style.opacity = '1';
    body.style.transform = 'translateX(0)';
  }, 120);

  updateNextBtn();
}

function buildChoiceHTML(q) {
  const badge = `<span class="q-type-badge choice">📋 객관식</span>`;
  const qText = `<div class="q-text"><span class="q-num">Q${currentQ+1}.</span> ${q.text}</div>`;
  const opts = q.options.map((o, i) =>
    `<button class="choice-btn" onclick="selectChoice(${i})" data-idx="${i}">
      <span class="choice-label">${String.fromCharCode(65+i)}</span>
      <span class="choice-icon">${o.icon}</span>
      <span class="choice-text">${o.text}</span>
    </button>`
  ).join('');
  return `${badge}${qText}<div class="choices">${opts}</div>`;
}

function buildLikertHTML(q) {
  const badge = `<span class="q-type-badge likert">⭐ 점수형</span>`;
  const textLines = q.text.replace('\n', '<br>');
  const qText = `<div class="q-text"><span class="q-num">Q${currentQ+1}.</span> ${textLines}</div>`;
  const emojis = ['😶','🙁','😐','😊','😄'];
  const btns = [1,2,3,4,5].map(v =>
    `<button class="likert-btn" onclick="selectLikert(${v})" data-val="${v}">${v}</button>`
  ).join('');
  const emojiRow = emojis.map(e => `<span>${e}</span>`).join('');
  return `${badge}${qText}
  <div class="likert-wrap">
    <div class="likert-stmt">나는 이런 편이에요!</div>
    <div class="likert-labels">
      <span class="likert-label">전혀<br>아님</span>
      <span class="likert-label" style="opacity:0">-</span>
      <span class="likert-label">보통</span>
      <span class="likert-label" style="opacity:0">-</span>
      <span class="likert-label">매우<br>그렇다</span>
    </div>
    <div class="likert-scale">${btns}</div>
    <div class="likert-emoji-row">${emojiRow}</div>
  </div>`;
}

// ============================================================
// SELECTION HANDLERS
// ============================================================
function selectChoice(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  updateNextBtn();
  // auto-advance after short delay
  setTimeout(() => {
    if (currentQ < TOTAL - 1) nextQuestion();
    else nextQuestion();
  }, 420);
}

function selectLikert(val) {
  answers[currentQ] = val;
  document.querySelectorAll('.likert-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.val) === val);
  });
  updateNextBtn();
}

function restoreAnswer() {
  const q = QUESTIONS[currentQ];
  const ans = answers[currentQ];
  if (ans === null) return;
  if (q.type === 'choice') {
    document.querySelectorAll('.choice-btn').forEach((b, i) => {
      b.classList.toggle('selected', i === ans);
    });
  } else {
    document.querySelectorAll('.likert-btn').forEach(b => {
      b.classList.toggle('selected', parseInt(b.dataset.val) === ans);
    });
  }
}

function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  const answered = answers[currentQ] !== null;
  btn.disabled = !answered;
  if (currentQ === TOTAL - 1) {
    btn.textContent = '결과 보기 🎉';
  } else {
    btn.textContent = '다음 문항 →';
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    const body = document.getElementById('q-body');
    body.style.transition = 'all 0.25s ease';
    body.style.opacity = '0';
    body.style.transform = 'translateX(-20px)';
    setTimeout(() => renderQuestion(), 150);
  }
}

function nextQuestion() {
  if (answers[currentQ] === null) {
    showToast('선택해주세요 😊');
    return;
  }
  if (currentQ < TOTAL - 1) {
    const body = document.getElementById('q-body');
    body.style.transition = 'all 0.25s ease';
    body.style.opacity = '0';
    body.style.transform = 'translateX(-20px)';
    setTimeout(() => {
      currentQ++;
      renderQuestion();
    }, 150);
  } else {
    showResults();
  }
}

// ============================================================
// ★ GOOGLE SHEETS 연동 설정 — 여기만 수정하세요!
// ============================================================
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwWDRj4Kc0UweO5sVJ1RKgXH5EPES_iJng-DiLTGfN9VRY0T5yKFa6_poOD7DsWyrGa/exec'; // ← 웹앱 URL 붙여넣기
let startTime = Date.now();

// CORS 우회: Image Ping 방식 (가장 안정적)
function sendToSheet(typeIdx, sc) {
  if (!SHEET_URL || SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;

  const typeNames = ['콘텐츠형', '판매형', '지식전달형', '모임형'];
  const elapsed   = Math.round((Date.now() - startTime) / 1000);
  const now       = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });

  const params = new URLSearchParams({
    timestamp : now,
    resultType: typeNames[typeIdx],
    s0: sc[0], s1: sc[1], s2: sc[2], s3: sc[3],
    elapsed   : elapsed
  });

  // ① Image Ping — CORS 완전 우회, 가장 신뢰도 높음
  const img = new Image();
  img.src = SHEET_URL + '?' + params.toString();

  // ② fetch 백업 (혹시 img 실패 시)
  try {
    fetch(SHEET_URL + '?' + params.toString(), {
      method: 'GET', mode: 'no-cors'
    }).catch(() => {});
  } catch(e) {}
}

// ============================================================
// CALCULATE RESULT
// ============================================================
function calcResult() {
  const sc = [0, 0, 0, 0];

  QUESTIONS.forEach((q, qi) => {
    const ans = answers[qi];
    if (ans === null) return;
    if (q.type === 'choice') {
      sc[q.options[ans].type] += 3;
    } else {
      q.types.forEach(t => { sc[t] += ans; });
    }
  });

  let maxIdx = 0;
  sc.forEach((v, i) => { if (v > sc[maxIdx]) maxIdx = i; });

  sendToSheet(maxIdx, sc); // ← 결과 전송

  return maxIdx;
}

// ============================================================
// SHOW RESULTS
// ============================================================
function showResults() {
  showScreen('screen-loading');
  setTimeout(() => {
    const typeIdx = calcResult();
    const type = Object.values(TYPES)[typeIdx];
    buildResultPage(type);
    showScreen('screen-result');
  }, 1800);
}

function buildResultPage(type) {
  const screen = document.getElementById('screen-result');

  const shareText = `나는 ${type.name} 창업자! 나의 창업 유형이 궁금하다면? → ${testUrl}`;

  const revenueHTML = type.revenues.map(r => `
    <div class="revenue-item ${r.featured ? 'featured' : ''}">
      <div class="revenue-title">
        ${r.title}

      </div>
      <div class="revenue-desc">${r.desc}</div>
      ${r.link ? `<a class="revenue-link" href="https://www.latpeed.com/products/WoU2q" target="_blank" rel="noopener">
        📖 중고책 부업 입문서 보러가기 →
      </a>` : ''}
    </div>
  `).join('');

  screen.innerHTML = `
    <div class="result-hero">
      <div class="result-hero-brand">유노혜미의 창업 유형 진단 결과</div>
      <span class="result-emoji">${type.emoji}</span>
      <div class="result-badge">나의 창업 유형</div>
      <div class="result-name">${type.name} 창업자</div>
      <div class="result-tagline">${type.tagline}</div>
    </div>

    <div class="result-card-wrap">
      <div class="result-card">
        <div class="result-desc">${type.desc}</div>

        <div class="result-section">
          <div class="section-title">💡 추천 수익 모델</div>
          <div class="revenue-items">${revenueHTML}</div>
        </div>
      </div>

      <!-- 공유 -->
      <div class="share-section" style="margin-top:16px;">
        <div class="share-title">🎁 내 결과를 친구에게 공유해요!</div>
        <div class="share-sub">"나는 ${type.name} 창업자야, 너는 어떤 유형?"</div>
        <div class="share-btns">
          <button class="share-btn kakao" onclick="shareKakao('${type.name}', '${type.tagline}', '${type.emoji}')">
            <span class="share-btn-icon">💛</span>카카오톡
          </button>
          <button class="share-btn insta" onclick="shareInsta('${type.name}')">
            <span class="share-btn-icon">📸</span>인스타
          </button>
          <button class="share-btn copy" onclick="copyLink('${shareText}')">
            <span class="share-btn-icon">🔗</span>링크복사
          </button>
        </div>
        <div class="cta-wrap">
          <a href="https://www.latpeed.com/products/WoU2q" target="_blank" rel="noopener" class="btn-cta">
            📚 중고책 부업 입문서 신청하기
            <div class="btn-cta-sub">초기 비용 0원 · 지금 바로 시작하는 부업의 첫걸음</div>
          </a>
          <button class="retry-btn" onclick="startTest()">🔄 테스트 다시 하기</button>
        </div>
      </div>

      <div class="result-footer">
        유노혜미의 N잡 창업 유형 진단 테스트<br>
        <a href="https://www.latpeed.com/products/WoU2q" target="_blank">중고책 부업 입문서 바로가기 →</a>
      </div>

}

// ============================================================
// SHARE FUNCTIONS
// ============================================================
function shareKakao(typeName, tagline, emoji) {
  const testUrl = window.location.href.split('?')[0];
  // Kakao SDK가 없으면 복사 폴백
  if (typeof Kakao !== 'undefined' && Kakao.isInitialized()) {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: `나는 ${typeName} 창업자! ${emoji}`,
        description: tagline + '\n\n내 창업 유형이 궁금하다면?',
        imageUrl: 'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=800',
        link: { mobileWebUrl: testUrl, webUrl: testUrl }
      },
      buttons: [{ title: '나도 해보기 →', link: { mobileWebUrl: testUrl, webUrl: testUrl } }]
    });
  } else {
    const text = `나는 ${typeName} 창업자! ${emoji}\n${tagline}\n\n나의 창업 유형이 궁금하다면?\n→ ${testUrl}`;
    copyToClipboard(text);
    showToast('📋 카카오 공유 문구를 복사했어요! 카카오톡에 붙여넣기 해주세요 😊');
  }
}

function shareInsta(typeName) {
  const testUrl = window.location.href.split('?')[0];
  const text = `나는 ${typeName} 창업자!\n나의 창업 유형이 궁금하다면?\n→ ${testUrl}`;
  copyToClipboard(text);
  showToast('📸 인스타 공유 문구가 복사됐어요! 스토리에 붙여넣어 보세요 ✨');
}

function copyLink(text) {
  copyToClipboard(text);
  showToast('🔗 링크가 복사되었어요!');
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(el);
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  // 프로그레스 바 초기 애니메이션
  document.getElementById('progress-fill') && (
    document.getElementById('progress-fill').style.width = '0'
  );
});
</script>
